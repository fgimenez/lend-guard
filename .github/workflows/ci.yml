name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:integration

  e2e:
    name: E2E tests (testnet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:e2e
        env:
          WDK_SEED: ${{ secrets.WDK_SEED }}
          RPC_SEPOLIA: ${{ secrets.RPC_SEPOLIA }}
          RPC_BASE_SEPOLIA: ${{ secrets.RPC_BASE_SEPOLIA }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
